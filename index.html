<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Abundancia Consciente - Módulo 1</title>
  <style>
    :root {
      --white: #ffffff;
      --ink: #151515;
      --deep: #064e3b;
      --emerald: #0f766e;
      --green: #16a34a;
      --sage: #dff5ea;
      --mint: #ecfdf5;
      --gold: #d4af37;
      --champagne: #fff8dc;
      --soft: #f8fafc;
      --gray: #6b7280;
      --line: #e5e7eb;
      --shadow: 0 24px 70px rgba(6, 78, 59, 0.18);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #f4fbf7;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body { overflow: hidden; }

    button {
      border: 0;
      background: none;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
    }

    .stage-wrap {
      min-height: calc(100vh - 78px);
      display: grid;
      place-items: center;
      padding: clamp(12px, 2.2vw, 30px);
      position: relative;
      background:
        radial-gradient(circle at 12% 12%, rgba(15, 118, 110, 0.15), transparent 28%),
        radial-gradient(circle at 88% 20%, rgba(212, 175, 55, 0.12), transparent 25%),
        linear-gradient(135deg, #f7fff9 0%, #eefaf4 48%, #fff9e8 100%);
    }

    .deck {
      width: min(94vw, calc((100vh - 168px) * 16 / 9));
      aspect-ratio: 16 / 9;
      position: relative;
      overflow: hidden;
      background: var(--white);
      border: 1px solid rgba(6, 78, 59, 0.18);
      border-radius: 10px;
      box-shadow: var(--shadow);
    }

    .slide {
      position: absolute;
      inset: 0;
      display: none;
      padding: 5.3% 5.4%;
      background:
        radial-gradient(circle at 92% 72%, rgba(15, 118, 110, 0.11), transparent 28%),
        radial-gradient(circle at 76% 18%, rgba(212, 175, 55, 0.10), transparent 22%),
        linear-gradient(90deg, rgba(255,255,255,0.98), rgba(247,255,250,0.94));
      overflow: hidden;
    }

    .slide.active {
      display: grid;
      grid-template-columns: 1fr;
      align-content: center;
      animation: popIn 180ms ease-out;
    }

    .slide.has-story {
      padding: 4.3% 4.6%;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.985); }
      to { opacity: 1; transform: scale(1); }
    }

    .slide::before,
    .slide::after {
      content: "";
      position: absolute;
      pointer-events: none;
      z-index: 0;
    }

    .slide::before {
      inset: 3.2%;
      border: 1px solid rgba(15, 118, 110, 0.12);
      border-radius: 8px;
    }

    .slide::after {
      right: -7%;
      bottom: -12%;
      width: 38%;
      aspect-ratio: 1;
      background: radial-gradient(circle, rgba(15, 118, 110, 0.22), rgba(212, 175, 55, 0.10) 45%, transparent 68%);
      opacity: 1;
      border-radius: 999px;
    }

    .slide.layout-split {
      background:
        linear-gradient(90deg, rgba(6,78,59,0.08) 0 32%, transparent 32%),
        radial-gradient(circle at 82% 18%, rgba(212,175,55,0.15), transparent 24%),
        #ffffff;
    }

    .slide.layout-split::after {
      left: 4.8%;
      right: auto;
      top: 18%;
      bottom: auto;
      width: 19%;
      background: linear-gradient(135deg, var(--deep), var(--emerald));
      opacity: 1;
      border-radius: 8px;
    }

    .slide.layout-statement {
      place-items: center;
      text-align: center;
      background:
        radial-gradient(circle at 50% 50%, rgba(236,253,245,0.95), transparent 42%),
        linear-gradient(135deg, #ffffff, #f7fff9 50%, #fff8dc);
    }

    .slide.layout-statement::before {
      inset: 5.2%;
      border-color: rgba(212, 175, 55, 0.36);
    }

    .slide.layout-workbook {
      background:
        linear-gradient(90deg, var(--deep) 0 25%, #ffffff 25% 100%);
    }

    .slide.layout-workbook::after {
      right: 5%;
      top: 9%;
      bottom: auto;
      width: 17%;
      background: repeating-linear-gradient(135deg, rgba(15,118,110,0.13) 0 12px, rgba(212,175,55,0.12) 12px 24px);
      border-radius: 8px;
    }

    .slide.layout-quote {
      background:
        linear-gradient(135deg, rgba(6,78,59,0.96), rgba(15,118,110,0.9)),
        #064e3b;
      color: var(--white);
    }

    .slide.layout-quote::before {
      border-color: rgba(255,255,255,0.22);
    }

    .slide.layout-quote::after {
      content: "“";
      right: 7%;
      top: -9%;
      bottom: auto;
      width: auto;
      background: none;
      color: rgba(212,175,55,0.28);
      font-family: Georgia, serif;
      font-size: clamp(180px, 28vw, 360px);
      line-height: 1;
      border-radius: 0;
    }

    .slide.layout-cards {
      background:
        linear-gradient(180deg, #ffffff 0 54%, #ecfdf5 54% 100%);
    }

    .slide.layout-cards::after {
      right: 7%;
      bottom: 7%;
      width: 18%;
      background: linear-gradient(135deg, rgba(212,175,55,0.28), rgba(15,118,110,0.18));
      border-radius: 8px;
    }

    .slide.layout-path {
      background:
        linear-gradient(135deg, #ffffff 0 42%, #f0fdf4 42% 68%, #fff8dc 68%);
    }

    .slide.layout-path::after {
      right: 8%;
      top: 14%;
      bottom: auto;
      width: 24%;
      background: conic-gradient(from 140deg, rgba(6,78,59,0.95), rgba(15,118,110,0.65), rgba(212,175,55,0.7), rgba(6,78,59,0.95));
      opacity: 0.18;
    }

    .slide.layout-cover {
      place-items: center;
      background:
        radial-gradient(circle at 82% 18%, rgba(212,175,55,0.22), transparent 22%),
        radial-gradient(circle at 18% 72%, rgba(15,118,110,0.16), transparent 28%),
        linear-gradient(135deg, #ffffff 0%, #f7fff9 56%, #fff8dc 100%);
      text-align: left;
    }

    .slide.layout-cover::after {
      right: 7%;
      bottom: 9%;
      width: 24%;
      background: linear-gradient(135deg, var(--deep), var(--emerald));
      opacity: 0.14;
      border-radius: 8px;
    }

    .content {
      position: relative;
      z-index: 1;
      display: grid;
      gap: clamp(12px, 2vw, 26px);
    }

    .visual-mark {
      position: absolute;
      z-index: 0;
      right: 5.4%;
      top: 6%;
      color: rgba(6, 78, 59, 0.08);
      font-size: clamp(78px, 13vw, 180px);
      font-weight: 1000;
      line-height: 1;
    }

    .layout-quote .visual-mark,
    .layout-workbook .visual-mark {
      color: rgba(255,255,255,0.12);
      left: 6%;
      right: auto;
    }

    .layout-split .content {
      grid-template-columns: 28% minmax(0, 1fr);
      align-items: center;
      gap: 5%;
    }

    .layout-split .content::before {
      content: attr(data-section);
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      min-height: 56%;
      padding: 18px;
      color: var(--white);
      background: linear-gradient(135deg, var(--deep), var(--emerald));
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      box-shadow: 0 24px 52px rgba(6, 78, 59, 0.24);
      text-align: center;
      text-transform: uppercase;
      font-size: clamp(18px, 2.5vw, 36px);
      line-height: 0.95;
      font-weight: 1000;
    }

    .layout-statement .content {
      width: min(92%, 1020px);
      justify-items: center;
      text-align: center;
      gap: clamp(8px, 1.35vw, 18px);
    }

    .layout-workbook .content {
      grid-template-columns: 22% minmax(0, 1fr);
      align-items: center;
      gap: 5%;
    }

    .layout-workbook .content::before {
      content: "✍️";
      display: grid;
      place-items: center;
      color: var(--gold);
      font-size: clamp(54px, 8vw, 118px);
    }

    .layout-quote .content {
      width: min(92%, 1040px);
      gap: clamp(9px, 1.4vw, 18px);
    }

    .layout-cards .content,
    .layout-path .content {
      width: min(94%, 1060px);
    }

    .layout-cover .content {
      width: min(86%, 980px);
      gap: clamp(14px, 2.2vw, 30px);
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 0.5%;
      color: var(--emerald);
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: clamp(9px, 1.1vw, 14px);
    }

    .layout-workbook .meta,
    .layout-quote .meta {
      color: rgba(255,255,255,0.82);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      min-height: 34px;
      padding: 7px 13px;
      background: linear-gradient(135deg, var(--champagne), #f1fff6);
      color: var(--ink);
      border: 1px solid rgba(6, 78, 59, 0.22);
      box-shadow: 0 12px 28px rgba(6, 78, 59, 0.10);
      font-size: clamp(11px, 1.3vw, 16px);
      font-weight: 950;
      border-radius: 999px;
    }

    .layout-quote .badge {
      background: rgba(255,255,255,0.10);
      color: var(--white);
      border-color: rgba(255,255,255,0.24);
      box-shadow: none;
    }

    .layout-workbook .badge {
      background: var(--white);
      color: var(--deep);
    }

    .slide-title {
      max-width: 92%;
      margin: 0;
      color: var(--deep);
      font-size: clamp(36px, 6vw, 78px);
      line-height: 0.92;
      font-weight: 1000;
      letter-spacing: 0;
      text-transform: uppercase;
      text-wrap: balance;
      text-shadow: none;
    }

    .layout-quote .slide-title {
      color: var(--white);
      max-width: 86%;
      font-size: clamp(34px, 5.45vw, 72px);
    }

    .layout-statement .slide-title {
      max-width: 980px;
      font-size: clamp(38px, 6.1vw, 78px);
    }

    .layout-workbook .slide-title {
      max-width: 96%;
      font-size: clamp(34px, 5.4vw, 72px);
    }

    .layout-split .slide-title {
      max-width: 91%;
      font-size: clamp(34px, 5.1vw, 66px);
    }

    .layout-cards .slide-title {
      max-width: 86%;
      font-size: clamp(34px, 5.35vw, 70px);
    }

    .has-story.layout-cards .slide-title {
      max-width: 76%;
      font-size: clamp(30px, 4.75vw, 62px);
      line-height: 0.92;
    }

    .layout-cover .slide-title {
      max-width: 900px;
      font-size: clamp(48px, 8.4vw, 112px);
      line-height: 0.9;
    }

    .cover-subtitle {
      width: min(780px, 86%);
      margin: 0;
      color: var(--ink);
      font-size: clamp(20px, 3vw, 38px);
      line-height: 1.05;
      font-weight: 850;
      text-wrap: balance;
    }

    .gold-rule {
      width: min(240px, 38%);
      height: 8px;
      background: linear-gradient(90deg, var(--gold), var(--emerald));
      border-radius: 999px;
    }

    .title-small .slide-title {
      font-size: clamp(31px, 5vw, 62px);
    }

    .hero .slide-title {
      max-width: 78%;
      font-size: clamp(42px, 7vw, 90px);
    }

    .bullets {
      display: grid;
      gap: clamp(9px, 1.4vw, 16px);
      width: min(90%, 980px);
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .layout-statement .bullets {
      width: min(100%, 980px);
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .layout-cards .bullets {
      width: 100%;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: stretch;
      margin-top: 8px;
    }

    .layout-path .bullets {
      width: min(88%, 920px);
      gap: clamp(12px, 1.8vw, 22px);
      counter-reset: path;
    }

    .bullet {
      display: grid;
      grid-template-columns: auto auto 1fr;
      align-items: center;
      gap: 14px;
      min-height: clamp(48px, 7vw, 74px);
      padding: 10px 18px 10px 12px;
      background: linear-gradient(135deg, rgba(255,255,255,0.97), rgba(236,253,245,0.92));
      border: 1px solid rgba(6, 78, 59, 0.16);
      border-radius: var(--radius);
      box-shadow: 0 16px 34px rgba(6, 78, 59, 0.10);
      font-size: clamp(16px, 2.3vw, 30px);
      line-height: 1.05;
      font-weight: 820;
    }

    .layout-quote .bullet {
      background: rgba(255,255,255,0.10);
      color: var(--white);
      border-color: rgba(255,255,255,0.18);
      box-shadow: none;
      min-height: clamp(42px, 5.8vw, 62px);
      font-size: clamp(15px, 2vw, 25px);
    }

    .layout-statement .bullet,
    .layout-cards .bullet {
      grid-template-columns: 1fr;
      justify-items: center;
      text-align: center;
      min-height: clamp(82px, 9.8vw, 128px);
      padding: clamp(14px, 2vw, 26px);
      align-content: center;
    }

    .layout-statement .bullet {
      font-size: clamp(15px, 2vw, 25px);
    }

    .layout-split .bullet {
      min-height: clamp(42px, 5.9vw, 64px);
      font-size: clamp(15px, 2vw, 25px);
    }

    .layout-cards .bullet {
      font-size: clamp(15px, 1.95vw, 25px);
    }

    .has-story.layout-cards .bullets {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(8px, 1.1vw, 13px);
    }

    .has-story.layout-cards .bullet {
      min-height: clamp(72px, 8.2vw, 108px);
      padding: clamp(10px, 1.6vw, 18px);
      font-size: clamp(14px, 1.75vw, 22px);
    }

    .layout-workbook .bullet {
      background: #ffffff;
      border-left: 7px solid var(--gold);
      box-shadow: 0 12px 26px rgba(6, 78, 59, 0.10);
    }

    .layout-path .bullet {
      grid-template-columns: auto 1fr;
      width: min(86%, 760px);
      box-shadow: 0 14px 34px rgba(6, 78, 59, 0.09);
    }

    .layout-path .bullet:nth-child(2) { margin-left: 8%; }
    .layout-path .bullet:nth-child(3) { margin-left: 16%; }

    .bullet-number {
      display: grid;
      place-items: center;
      width: clamp(38px, 5.3vw, 58px);
      aspect-ratio: 1;
      background: linear-gradient(135deg, var(--deep), var(--emerald));
      color: var(--white);
      font-size: clamp(15px, 2vw, 24px);
      font-weight: 1000;
      border-radius: 999px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.25);
    }

    .bullet-icon {
      display: grid;
      place-items: center;
      width: clamp(32px, 4.3vw, 48px);
      aspect-ratio: 1;
      background: var(--champagne);
      border: 1px solid rgba(212, 175, 55, 0.55);
      border-radius: 999px;
      font-size: clamp(16px, 2.1vw, 25px);
    }

    .layout-path .bullet-icon { display: none; }
    .layout-statement .bullet-number,
    .layout-cards .bullet-number {
      width: clamp(44px, 5.2vw, 64px);
    }

    .layout-quote .bullet-number {
      background: var(--gold);
      color: var(--deep);
    }

    .single {
      width: min(88%, 980px);
      padding: clamp(18px, 3vw, 36px);
      background: var(--white);
      border: 1px solid rgba(6, 78, 59, 0.16);
      box-shadow: 0 20px 48px rgba(6, 78, 59, 0.14);
      font-size: clamp(24px, 4vw, 54px);
      line-height: 1.02;
      font-weight: 1000;
    }

    .kimberly {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(210px, 31%);
      gap: 3.2%;
      align-items: center;
    }

    .story-card {
      padding: 6.4%;
      background: linear-gradient(135deg, var(--deep), var(--emerald));
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: 0 22px 50px rgba(6, 78, 59, 0.24);
      border-radius: var(--radius);
    }

    .story-card strong {
      display: block;
      color: var(--gold);
      font-size: clamp(16px, 2.05vw, 27px);
      line-height: 1.02;
      margin-bottom: 6%;
      text-transform: uppercase;
    }

    .story-card span {
      display: block;
      font-size: clamp(12px, 1.55vw, 20px);
      line-height: 1.15;
      font-weight: 760;
    }

    .layout-quote .story-card {
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.22);
      box-shadow: none;
    }

    .sticker-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    .sticker {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 11px;
      background: var(--mint);
      border: 1px solid rgba(6, 78, 59, 0.18);
      font-weight: 950;
      font-size: clamp(12px, 1.5vw, 18px);
      border-radius: 999px;
    }

    .sticker:nth-child(2n) { background: var(--champagne); }
    .sticker:nth-child(3n) { background: var(--sage); }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: clamp(4px, 1vw, 10px);
    }

    .nav-ctas {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 2px 0;
    }

    .nav-ctas::-webkit-scrollbar { display: none; }

    .nav-ctas[hidden] {
      display: none;
    }

    .cta-link {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      flex: 0 0 auto;
      min-height: 38px;
      padding: 9px 13px;
      color: var(--deep);
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(6, 78, 59, 0.22);
      box-shadow: 0 9px 22px rgba(6, 78, 59, 0.10);
      border-radius: 999px;
      font-size: clamp(12px, 1.1vw, 15px);
      line-height: 1;
      font-weight: 1000;
      text-decoration: none;
      white-space: nowrap;
    }

    .cta-link.primary {
      color: var(--white);
      background: linear-gradient(135deg, var(--deep), var(--emerald));
      border-color: rgba(255,255,255,0.18);
    }

    .cta-link.gold {
      color: var(--deep);
      background: linear-gradient(135deg, #f8d75c, var(--gold));
      border-color: rgba(182, 141, 64, 0.38);
    }

    .cta-link.social {
      background: var(--mint);
    }

    .controls {
      min-height: 78px;
      display: grid;
      grid-template-columns: minmax(145px, 0.8fr) auto minmax(260px, 1.1fr) minmax(145px, 0.8fr);
      gap: 12px;
      align-items: center;
      padding: 12px clamp(12px, 2vw, 28px);
      background: rgba(255,255,255,0.93);
      border-top: 1px solid rgba(6, 78, 59, 0.14);
      backdrop-filter: blur(14px);
    }

    .status {
      display: grid;
      gap: 8px;
      color: var(--gray);
      font-size: 13px;
      font-weight: 760;
    }

    .status.right { justify-items: end; text-align: right; }

    .progress {
      width: min(280px, 31vw);
      height: 8px;
      background: var(--line);
      border: 1px solid rgba(6, 78, 59, 0.20);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--deep), var(--emerald), var(--gold));
    }

    .btn-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .nav-btn,
    .tool-btn {
      display: inline-grid;
      place-items: center;
      min-width: 42px;
      height: 42px;
      padding: 0 12px;
      background: var(--white);
      border: 1px solid rgba(6, 78, 59, 0.22);
      color: var(--ink);
      font-weight: 1000;
      box-shadow: 0 9px 22px rgba(6, 78, 59, 0.10);
      border-radius: var(--radius);
    }

    .nav-btn.primary {
      min-width: 106px;
      background: linear-gradient(135deg, var(--deep), var(--emerald));
      color: var(--white);
    }

    .tool-btn.active {
      background: var(--champagne);
      color: var(--deep);
    }

    .drawer {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      overflow: auto;
      padding: 28px;
      background: rgba(244, 251, 247, 0.98);
    }

    .drawer.open { display: block; }

    .drawer-head {
      max-width: 1180px;
      margin: 0 auto 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .drawer h3 {
      margin: 0;
      color: var(--deep);
      font-size: 34px;
      text-transform: uppercase;
    }

    .thumbs {
      max-width: 1180px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 14px;
    }

    .thumb {
      aspect-ratio: 16 / 9;
      padding: 14px;
      overflow: hidden;
      background: var(--white);
      border: 1px solid rgba(6, 78, 59, 0.16);
      box-shadow: 0 14px 34px rgba(6, 78, 59, 0.12);
      text-align: left;
      border-radius: var(--radius);
    }

        bullets: ["1️⃣ Primero observas.", "2️⃣ Luego cuestionas.", "3️⃣ Después instalas una nueva forma de sostener abundancia."],
        notes: "Cierre con energía y continuidad."
      }
    ];

    const deck = document.getElementById("deck");
    const progressBar = document.getElementById("progressBar");
    const slideStatus = document.getElementById("slideStatus");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const overviewBtn = document.getElementById("overviewBtn");
    const notesBtn = document.getElementById("notesBtn");
    const timerBtn = document.getElementById("timerBtn");
    const fullBtn = document.getElementById("fullBtn");
    const printBtn = document.getElementById("printBtn");
    const drawer = document.getElementById("drawer");
    const closeOverview = document.getElementById("closeOverview");
    const thumbs = document.getElementById("thumbs");
    const notesPanel = document.getElementById("notesPanel");
    const notesText = document.getElementById("notesText");
    const timerText = document.getElementById("timerText");
    const navCtas = document.getElementById("navCtas");

    let current = 0;
    let timer = null;
    let seconds = 0;

    function renderCtas(item) {
      const directCtas = item.cta || [];
      const socialCtas = (item.socials || []).map((key) => ({
        ...socialLinks[key],
        kind: "social"
      })).filter((cta) => cta.href);
      return [...directCtas, ...socialCtas].map((cta) => {
        const href = cta.slide ? `#slide-${cta.slide}` : cta.href;
        const target = href?.startsWith("http") ? ' target="_blank" rel="noopener noreferrer"' : "";
        const goTo = cta.slide ? ` data-go-to="${cta.slide - 1}"` : "";
        return `<a class="cta-link ${cta.kind || ""}" href="${href}"${target}${goTo}><span>${cta.icon || "✨"}</span><span>${cta.label}</span></a>`;
      }).join("");
    }

    function renderSlides() {
      deck.innerHTML = "";
      slidesData.forEach((item, index) => {
        const pickedLayout = item.layout || sectionLayouts[item.section] || layouts[index % layouts.length];
        const layout = item.story && pickedLayout === "split" ? "cards" : pickedLayout;
        const article = document.createElement("article");
        article.className = `slide layout-${layout} ${item.story ? "has-story" : ""} ${item.title.length > 42 ? "title-small" : ""}`;
        article.id = `slide-${index + 1}`;
        article.dataset.title = item.title;
        article.dataset.notes = item.notes || "";

        const bullets = (item.bullets || []).map((text, i) => `
          <li class="bullet" style="--color:${colors[(i + index) % colors.length]}">
            <span class="bullet-number">${i + 1}</span>
            <span class="bullet-icon">${bulletIcons[(i + index) % bulletIcons.length]}</span>
            <span>${text.replace(/^\d+️⃣\s*/, "")}</span>
          </li>
        `).join("");

        const story = item.story ? `<aside class="story-card"><strong>Kimberly cuenta</strong><span>${item.story}</span></aside>` : "";
        const mainContent = item.subtitle
          ? `<p class="cover-subtitle">${item.subtitle}</p><div class="gold-rule"></div>`
          : `<ol class="bullets">${bullets}</ol>`;

        article.innerHTML = `
          <span class="visual-mark">${String(index + 1).padStart(2, "0")}</span>
          <div class="content ${item.story ? "kimberly" : ""}" data-section="${item.section}">
            <div>
              <div class="meta"><span>${item.section}</span><span>${String(index + 1).padStart(2, "0")}/${String(slidesData.length).padStart(2, "0")}</span></div>
              <div class="badge">${item.badge}</div>
              <h1 class="slide-title">${item.title}</h1>
              ${mainContent}
            </div>
            ${story}
          </div>
        `;
        deck.appendChild(article);
      });
    }

    function buildThumbs() {
      thumbs.innerHTML = "";
      slidesData.forEach((slide, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "thumb";
        button.innerHTML = `<b>${String(index + 1).padStart(2, "0")}</b><span>${slide.title}</span>`;
        button.addEventListener("click", () => {
          showSlide(index);
          toggleOverview(false);
        });
        thumbs.appendChild(button);
      });
    }

    function showSlide(index) {
      const slides = Array.from(document.querySelectorAll(".slide"));
      current = Math.max(0, Math.min(slides.length - 1, index));
      slides.forEach((slide, i) => slide.classList.toggle("active", i === current));
      slideStatus.textContent = `Diapositiva ${current + 1} de ${slides.length}`;
      progressBar.style.width = `${((current + 1) / slides.length) * 100}%`;
      prevBtn.disabled = current === 0;
      nextBtn.textContent = current === slides.length - 1 ? "Final" : "Siguiente";
      notesText.textContent = slides[current].dataset.notes;
      const navActions = renderCtas(slidesData[current]);
      navCtas.innerHTML = navActions;
      navCtas.hidden = !navActions;
      Array.from(thumbs.children).forEach((thumb, i) => thumb.classList.toggle("active", i === current));
    }

    function nextSlide() { showSlide(current + 1); }
    function prevSlide() { showSlide(current - 1); }

    function toggleOverview(force) {
      const open = typeof force === "boolean" ? force : !drawer.classList.contains("open");
      drawer.classList.toggle("open", open);
      overviewBtn.classList.toggle("active", open);
    }

    function toggleNotes() {
      const open = !notesPanel.classList.contains("open");
      notesPanel.classList.toggle("open", open);
      notesBtn.classList.toggle("active", open);
    }

    function toggleTimer() {
      if (timer) {
        clearInterval(timer);
        timer = null;
        timerBtn.classList.remove("active");
        return;
      }
      timerBtn.classList.add("active");
      timer = setInterval(() => {
        seconds += 1;
        const mm = String(Math.floor(seconds / 60)).padStart(2, "0");
        const ss = String(seconds % 60).padStart(2, "0");
        timerText.textContent = `${mm}:${ss}`;
      }, 1000);
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen?.();
      } else {
        document.exitFullscreen?.();
      }
    }

    prevBtn.addEventListener("click", prevSlide);
    nextBtn.addEventListener("click", nextSlide);
    overviewBtn.addEventListener("click", () => toggleOverview());
    closeOverview.addEventListener("click", () => toggleOverview(false));
    notesBtn.addEventListener("click", toggleNotes);
    timerBtn.addEventListener("click", toggleTimer);
    fullBtn.addEventListener("click", toggleFullscreen);
    printBtn.addEventListener("click", () => window.print());
    document.addEventListener("click", (event) => {
      const link = event.target.closest("[data-go-to]");
      if (!link) return;
      event.preventDefault();
      showSlide(Number(link.dataset.goTo));
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === "PageDown" || event.key === " ") nextSlide();
      if (event.key === "ArrowLeft" || event.key === "PageUp") prevSlide();
      if (event.key === "Home") showSlide(0);
      if (event.key === "End") showSlide(slidesData.length - 1);
      if (event.key.toLowerCase() === "o") toggleOverview();
      if (event.key.toLowerCase() === "n") toggleNotes();
      if (event.key.toLowerCase() === "f") toggleFullscreen();
      if (event.key === "Escape") toggleOverview(false);
    });

    renderSlides();
    buildThumbs();
    showSlide(0);
  </script>
</body>
</html>
